<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LexAI – {{ code | default(404) }} Error</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#05050f;--accent:#7c3aed;--accent2:#06b6d4;--text:#e2e8f0;--text-d:#64748b;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;}
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.18;animation:drift 18s ease-in-out infinite;}
.orb1{width:600px;height:600px;background:radial-gradient(circle,#7c3aed,transparent);top:-100px;left:-100px;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#06b6d4,transparent);bottom:-50px;right:-50px;animation-delay:-9s;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-30px);}}
.card{
  position:relative;z-index:1;text-align:center;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;padding:3rem 3.5rem;max-width:460px;width:90%;
}
.err-code{
  font-size:5rem;font-weight:800;letter-spacing:-.04em;
  background:linear-gradient(135deg,#a78bfa,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin-bottom:.5rem;
}
.err-title{font-size:1.15rem;font-weight:700;margin-bottom:.75rem;}
.err-msg{font-size:.82rem;color:var(--text-d);margin-bottom:2rem;line-height:1.65;}
.back-btn{
  display:inline-block;padding:.7rem 1.75rem;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#6d28d9);
  color:#fff;text-decoration:none;font-size:.82rem;font-weight:600;
  transition:all .2s;box-shadow:0 4px 16px rgba(124,58,237,.35);
}
.back-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.5);}
.err-icon{font-size:2.5rem;margin-bottom:1rem;animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
</style>
</head>
<body>
<div class="bg-mesh"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="card">
  <div class="err-icon">⚖️</div>
  <div class="err-code">{{ code | default(404) }}</div>
  <div class="err-title">{{ title | default('Page Not Found') }}</div>
  <div class="err-msg">{{ message | default('The page you are looking for does not exist.') }}</div>
  <a class="back-btn" href="/dashboard">← Back to Dashboard</a>
</div>
</body>
</html>
